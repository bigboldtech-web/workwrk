name: CI

# Quality gate: validates the Prisma schema on every PR and on pushes to main.
# Deploy (.github/workflows/deploy.yml) waits for this to pass before shipping.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Prisma validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the production runtime (aaPanel runs Node 20.20.0).
          node-version: 20
          cache: npm

      # postinstall runs `prisma generate`; the schema uses a driver adapter
      # (no url in the datasource) so neither install nor validate needs a DB.
      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate