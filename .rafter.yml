# Rafter scanner config — false-positive suppressions.
# Each entry was traced input -> sink before suppressing (see PR notes).
ignore:
  # R-E98AA: "input type=text should be type=email". Fired on 93 inputs that are
  # company-name, first/last-name, domain, logo-URL and search/filter fields —
  # none are email inputs. Forcing type="email" on them would be incorrect.
  - rule: R-E98AA

  # R-374DB: path.join "traversal". All flagged sinks build paths from constants,
  # the session orgId, Date.now(), or a mime->ext whitelist — no attacker-
  # controlled segment reaches them. The scripts/* hits are build-time tooling on
  # constant paths (import.meta.url, hardcoded target lists), not runtime-reachable.
  - rule: R-374DB

  # R-6D5E2: "vulnerable i18next 3.4.2". The project has no i18next dependency
  # (it uses next-intl). The cited lockfile lines are @smithy/util-endpoints,
  # consola, and flatted — unrelated packages that merely share version 3.4.2.
  - rule: R-6D5E2

  # R-5EC1A: "high-priority comment tag 'Stub'" in src/lib/payroll/provider.ts.
  # An intentional, documented preview-only payroll provider (post action stays
  # disabled until a real provider is wired). Not a security defect.
  - rule: R-5EC1A
    path: src/lib/payroll/provider.ts